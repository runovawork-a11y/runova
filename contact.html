<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Runova</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Main CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Additional styling for bigger form and contact page enhancements -->
  <style>
    /* Make the contact section more spacious */
    .contact-container {
      max-width: 1200px;
      margin: 4rem auto;
      padding: 0 2rem;
      display: flex;
      gap: 4rem;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .contact-image {
      flex: 1;
      min-width: 280px;
    }

    .contact-image img {
      width: 100%;
      border-radius: 2rem;
      box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.1);
      object-fit: cover;
    }

    /* Larger form box */
    .contact-form-box {
      flex: 1.4;
      background: #ffffff;
      border-radius: 2rem;
      padding: 2rem;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.05);
      border: 1px solid #eef2ff;
    }

    /* Increase form field sizes */
    .form-group {
      margin-bottom: 1.8rem;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.6rem;
      color: #0f172a;
      font-size: 1rem;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 1rem 1.2rem;
      font-size: 1rem;
      font-family: 'Poppins', sans-serif;
      border: 1px solid #e2e8f0;
      border-radius: 1rem;
      background: #fafcff;
      transition: all 0.2s ease;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #10b981;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
      background: white;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 150px;
    }

    /* Bigger button */
    .contact-form-box .btn {
      width: 100%;
      text-align: center;
      padding: 1rem;
      font-size: 1.1rem;
      background: linear-gradient(105deg, #10b981, #06b6d4);
      border: none;
      color: white;
      font-weight: 600;
      border-radius: 3rem;
      cursor: pointer;
      transition: all 0.25s;
    }

    .contact-form-box .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
    }

    #formStatus {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.9rem;
      color: #10b981;
    }

    /* Social section styling (consistent with style.css) */
    .social {
      text-align: center;
      padding: 4rem 2rem;
      background: #ffffff;
      border-top: 1px solid #eef2ff;
    }

    .social h2 {
      font-size: 2rem;
      margin-bottom: 2rem;
      color: #0f172a;
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .social-btn {
      background: #f1f5f9;
      color: #0f172a;
      padding: 0.8rem 2rem;
      border-radius: 3rem;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.2s;
      border: 1px solid #e2e8f0;
    }

    .social-btn:hover {
      background: #10b981;
      color: white;
      border-color: #10b981;
      transform: translateY(-2px);
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      .contact-container {
        flex-direction: column;
        gap: 2rem;
        margin: 2rem auto;
      }
      .contact-form-box {
        padding: 1.5rem;
      }
      .form-group input,
      .form-group textarea {
        padding: 0.8rem 1rem;
      }
    }
  </style>
</head>
<body>

<!-- ================= NAVBAR ================= -->
<header>
  <nav class="navbar">
    <h2 class="logo">Runova</h2>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="explore.html">Explore Runs</a></li>
      <li><a href="events.html">Runova Events</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>
</header>

<!-- ================= PAGE HEADER ================= -->
<section class="page-header" style="text-align: center; padding: 4rem 2rem 2rem; background: #ffffff;">
  <h1 style="font-size: 2.8rem; color: #0f172a;">Contact Us</h1>
  <p style="font-size: 1.2rem; color: #475569; max-width: 700px; margin: 1rem auto 0;">Have questions or want to collaborate? We'd love to hear from you.</p>
</section>

<!-- ================= CONTACT SECTION (BIG FORM) ================= -->
<section class="contact-container">

  <!-- LEFT IMAGE -->
  <div class="contact-image">
    <img src="contact-runova.png" alt="Contact Runova">
  </div>

  <!-- RIGHT FORM (Larger) -->
  <div class="contact-form-box">
    <form id="contactForm">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="your@gmail.com" required>
      </div>

      <div class="form-group">
        <label>Your Message</label>
        <textarea id="message" rows="6" placeholder="Tell us about your running goals, questions, or collaboration ideas..."></textarea>
      </div>

      <button class="btn" onclick="sendToWhatsApp(event)">Send Message via WhatsApp</button>
      <p id="formStatus"></p>
    </form>
  </div>

</section>

<!-- ================= SOCIAL CONNECT ================= -->
<section class="social">
  <h2>Connect with us</h2>
  <div class="social-links">
    <a href="#" class="social-btn">Instagram</a>
    <a href="mailto:runova.work@gmail.com" class="social-btn">Email</a>
  </div>
</section>

<!-- ================= FOOTER ================= -->
<footer>
  <div class="footer-content">
    <h3>Runova</h3>
    <p>All Runs. One Platform.</p>
    <div class="footer-links">
      <a href="https://www.instagram.com/runovaofficialpage?igsh=MXc5MWlhZzhycWE2bg==">Instagram</a>
      <a href="runova.work@gmail.com">Email</a>
    </div>
    <p>© 2026 Runova. All rights reserved.</p>
  </div>
</footer>

<!-- ================= SCRIPT (WhatsApp) ================= -->
<script>
function sendToWhatsApp(e) {
  e.preventDefault();

  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const message = document.getElementById('message').value;

  // Basic validation
  if (!name.trim() || !email.trim()) {
    document.getElementById('formStatus').innerText = 'Please fill in your name and email.';
    return;
  }

  const text = `Hello Runova,%0AName: ${name}%0AEmail: ${email}%0AMessage: ${message}`;
  const phone = "919387804914";
  const url = `https://wa.me/${phone}?text=${text}`;

  window.open(url, "_blank");
  document.getElementById('formStatus').innerText = 'Opening WhatsApp...';
}
</script>

</body>
</html>
